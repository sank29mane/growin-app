name: Growin Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run SOTA Test Suite
    runs-on: macos-latest
    timeout-minutes: 20
    
    env:
      CI: "true"
      GROWIN_ANALYTICS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --project backend --all-groups

      - name: Run SOTA Unit & Integration Tests
        timeout-minutes: 10
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          uv run --project backend pytest tests/backend/

      - name: Run Performance Benchmarks
        timeout-minutes: 5
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          uv run --project backend pytest tests/backend/test_performance_benchmarks.py
          
      - name: DeepEval Reasoning Audit
        run: |
          # Placeholder for DeepEval logic
          echo "Executing Reasoning Trace Audit..."
